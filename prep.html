      <h1>停電・断水で詰む前にやるべき最低限の備蓄リスト【初心者向け】</h1>

      <p>災害が起きたとき、一番困るのは「何を準備すればいいかわからないこと」です。</p>

      <h2>最低限必要な備蓄</h2>
      <p>水、食料、トイレ、電源、防災セットが必要です。</p>

      <h2>最低限の基準</h2>
      <p>まずは3日分、できれば1週間以上を目安に備えましょう。</p>

      <h2>なぜ必要か</h2>
      <p>災害直後は支援が来ないため、自分で生きるための備えが必要です。</p>

      <a href="article.html">防災セットを確認する</a>
