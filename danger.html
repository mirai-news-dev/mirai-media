      <h1>地震が来たら何日で生活が崩壊するのか？備蓄なしのリアルな現実</h1>

      <p>大地震が起きたとき、電気も水も食料もない状態で何日耐えられるか考えたことはありますか？</p>

      <h2>1日目に起きること</h2>
      <p>冷蔵庫の食料でしのぐが停電で腐り始める。トイレが使えず水分も控えるようになる。</p>

      <h2>2日目に起きること</h2>
      <p>配給が遅れ、食料が手に入らない。体力も落ち精神的に追い詰められる。</p>

      <h2>3日目に起きること</h2>
      <p>空腹で動けなくなり、備蓄がないと生きられないと感じる。</p>
